units:
  kx: cx
  ky: cy
  px: kx + 4
  py: ky + 4
  dpx: kx + 8
  dpy: ky + 8
  hole_size: 
points:
  zones:
    matrix:
      # Fix placement on KiCAD sheet.
      anchor:
        shift: [70, -180]
      key:
        padding: 1ky
        spread: 1kx
      columns:
        outer:
          key.column_net: P115
        pinky:
          key.stagger: 0
          key.column_net: P113
        ring:
          key.stagger: 8
          key.column_net: P111
        middle:
          key.stagger: 2
          key.column_net: P010
        index:
          key.stagger: -2
          key.column_net: P009
          rows.mod.skip: true
        inner:
          key.stagger: -2
          key.column_net: P011
          rows.mod.skip: true
      rows:
        mod:
          row_net: P002
        bottom:
          row_net: P029
        home:
          row_net: P031
        top:
          row_net: P106
        num:
          row_net: P104
    thumbs:
      key:
        height: 1.5ky
        spread: 1kx
      anchor:
        ref: matrix_index_mod
        shift: [0.2kx, -0.41ky]
      columns:
        first:
          key.column_net: P010
        second:
          rows.cluster.splay: -20
          key.column_net: P009
          key.shift: [0.25kx, -0.14ky]
        third:
          rows.cluster.splay: -20
          key.column_net: P011
          key.shift: [0.53kx, -0.18ky]
      rows:
        cluster:
          row_net: P100
  mirror: &mirror
    ref: thumbs_third_cluster
    distance: 2ky
outlines:
  keycaps:
    - what: rectangle
      where: /^.*matrix.*$/
      size: [17.5, 16.5]
    - what: rectangle
      where: /^.*thumbs.*$/
      size: [16.5, 26.5]
  raw:
    - what: rectangle
      where: true
      size: [px, py]
  keys:
    - what: rectangle
      where: true
      size: [14, 14]
  boardleft:
    - what: polygon
      operation: stack
      fillet: 3
      points:
        - ref: matrix_middle_num
          shift: [-3kx - 0.5px, 0.5py]
        - ref: matrix_middle_num
          shift: [2kx + 0.5px, 0.5py]
        - ref: matrix_inner_bottom
          shift: [0.5px, -0.16py]
        - ref: thumbs_third_cluster
          shift: [-0.5kx, 0.75py]
        - ref: thumbs_third_cluster
          shift: [0.5px, 0.75py]
        - ref: thumbs_third_cluster
          shift: [0.5px, -0.75py]
        - ref: thumbs_second_cluster
          shift: [0.5kx, -0.75py]
        - ref: thumbs_first_cluster
          shift: [0.5kx, -0.75py]
        - ref: thumbs_first_cluster
          shift: [-0.5px, -0.75py]
        - ref: thumbs_first_cluster
          shift: [-4kx - 0.2kx - 0.5px, -0.75py]
pcbs:
  left:
    outlines:
      main:
        outline: boardleft
    footprints:
      # Hotswap switches
      choc_hotswap:
        where: /^matrix_.*|^thumbs.*/
        what: choc
        params:
          hotswap: true
          reverse: false
          keycaps: true
          from: "{{column_net}}"
          to: "{{colrow}}"
      # Battery jack
      jstph:
        what: jstph
        where:
          ref: thumbs_first_cluster
          shift: [0, 0.75ky]
          rotate: 90
        params:
          side: B
          pos: pos
          neg: GND
      # Reset button
      reset:
        what: EVQPUC
        where:
          ref: thumbs_third_cluster
          shift: [-1kx, 0.75ky + 1]
        params:
          side: B
          from: GND
          to: RST
      # Battery on/off switch
      battery_switch:
        what: slider
        where:
          ref: thumbs_third_cluster
          shift: [0, 0.75ky + 1]
        params:
          side: B
          from: pos
          to: RAW
      # Microcontroller
      nice_nano:
        what: nice_nano
        params:
          orientation: "up"
        where:
          ref: matrix_inner_num
          shift: [-9.0, 4.5]
          rotate: 180
      # Diodes for each switch
      diode:
        what: diode
        where: /^matrix_(?!(?:index_num|inner_num))|^thumbs.*$/
        params:
          from: "{{colrow}}"
          to: "{{row_net}}"
        adjust:
          shift: [0, -4]
      diode_controller_fix:
        what: diode
        where: /^matrix_(?:index_num|inner_num)$/
        params:
          from: "{{colrow}}"
          to: "{{row_net}}"
        adjust:
          shift: [0, -8]
      # Mounting holes
      hole_top_left:
        what: mountinghole
        where:
          ref: [matrix_outer_num]
          shift: [0.5kx, -0.3ky]
      hole_top_right:
        what: mountinghole
        where:
          ref: [matrix_index_num]
          shift: [-0.5kx, -0.3ky]
      hole_bottom_left:
        what: mountinghole
        where:
          ref: [matrix_outer_mod]
          shift: [0.5kx, -0.3ky]
      hole_bottom_right:
        what: mountinghole
        where:
          ref: [thumbs_second_cluster]
          shift: [0.5kx, -0.3ky]
      hole_bottom_middle:
        what: mountinghole
        where:
          ref: [matrix_middle_mod]
          shift: [0, -0.6ky]
